<script>
// ===== 데이터 펼치기 =====
const GRADES = Object.keys(IV_RAW);
const ALL = [];
GRADES.forEach(g => IV_RAW[g].forEach(([b, pa, pp, m, pat]) => ALL.push({ b, pa, pp, m, pat, g, key: b })));
const INDEX = {};
ALL.forEach(v => INDEX[v.key] = v);
const PAT_LV = '⭐ 패턴별';
const LEVELS = GRADES.concat([PAT_LV]);

// ===== 저장 =====
const STORE_KEY = 'irreg-verbs-v1';
function loadStore() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; } }
function saveStore() { try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {} }
const sv = loadStore();
const store = {
  answered: sv.answered || 0,
  correct: sv.correct || 0,
  streak: sv.streak || 0,
  bestStreak: sv.bestStreak || 0,
  wrong: Array.isArray(sv.wrong) ? sv.wrong : [],   // [key]
  stats: sv.stats || {},                            // key -> {c,w}
  level: LEVELS.includes(sv.level) ? sv.level : LEVELS[0]
};

// ===== 상태 =====
let level = store.level;
let mode = 'table';
let hidePast = false, hidePP = false, hideMean = false;
let cardDeck = [], cardIdx = 0, cardFlipped = false;
let testType = null, testQs = [], testIdx = 0, testScore = 0, testLocked = false, testOver = false;
let curBlank = 'pa';
let reviewOn = false, reviewLocked = false;
let searchQuery = '';

// ===== 헬퍼 =====
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
function levelItems() { return level === PAT_LV ? ALL.slice() : ALL.filter(v => v.g === level); }
function byPattern(items) {
  const out = [];
  for (const p of IV_PAT_ORDER) {
    const g = items.filter(v => v.pat === p);
    if (g.length) out.push([p, g]);
  }
  return out;
}
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function norm(s) { return String(s).trim().toLowerCase().replace(/\s+/g, ' '); }
function formMatch(input, answer) { return answer.split('/').some(a => norm(a) === norm(input)); }
function stat(key) { return store.stats[key] || { c: 0, w: 0 }; }
function bump(key, ok) {
  const s = store.stats[key] || { c: 0, w: 0 };
  if (ok) s.c++; else s.w++;
  store.stats[key] = s;
  store.answered++;
  if (ok) { store.correct++; store.streak++; if (store.streak > store.bestStreak) store.bestStreak = store.streak; addReviewClear(key); }
  else { store.streak = 0; addReview(key); }
  saveStore(); updateHero(); updateReviewCount();
}
function addReview(key) { if (!store.wrong.includes(key)) store.wrong.push(key); }
function addReviewClear(key) { const i = store.wrong.indexOf(key); if (i >= 0) store.wrong.splice(i, 1); }
function reviewItems() { return store.wrong.map(k => INDEX[k]).filter(Boolean); }

// ===== 발음 (영단어 앱과 동일: 원어민 음원 → 구글 TTS → 기기 음성) =====
const ttsOK = 'speechSynthesis' in window;
const player = new Audio();
player.preload = 'auto';
let enVoice = null;
const audioCache = {};   // url -> 미리 받아둔 Audio (소리 파일까지 받아둬 즉시 재생)
let curAudio = null;     // 현재 재생 중인 오디오 요소
function preloadAudio(url) {
  if (!url || audioCache[url]) return;
  if (Object.keys(audioCache).length >= 220) return;   // 메모리 상한
  const a = new Audio(); a.preload = 'auto'; a.src = url; audioCache[url] = a;
}
function stopAudio() { try { if (curAudio) { curAudio.onended = null; curAudio.onerror = null; curAudio.pause(); } } catch (e) {} if (ttsOK) { try { speechSynthesis.cancel(); } catch (e) {} } }

// 사전(dictionaryapi.dev) 원어민 음원 — localStorage 캐시
const DICT_CACHE_KEY = 'irreg-verbs-dictcache';
let dictCache = {};
try { dictCache = JSON.parse(localStorage.getItem(DICT_CACHE_KEY)) || {}; } catch (e) {}
function saveDictCache() { try { localStorage.setItem(DICT_CACHE_KEY, JSON.stringify(dictCache)); } catch (e) {} }
async function getDictAudio(word) {
  if (word in dictCache) return dictCache[word];
  let best = null, keep = false;
  try {
    const r = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if (r.ok) {
      keep = true;
      const data = await r.json();
      outer:
      for (const entry of data) for (const ph of (entry.phonetics || [])) {
        if (!ph.audio) continue;
        if (/-us\.mp3/i.test(ph.audio)) { best = ph.audio; break outer; }   // 미국식 우선
        if (!best) best = ph.audio;
      }
    } else if (r.status === 404) { keep = true; }   // 사전에 없는 단어 → 음원 없음 확정
    // 429(과다 요청)·5xx 등 일시 오류는 캐시하지 않고 다음에 재시도
  } catch (e) { return null; }                       // 네트워크 오류도 캐시 안 함
  if (keep) { dictCache[word] = best; saveDictCache(); }
  return best;
}
// 음원 미리 받기 — 동시 4개로 제한(과다 요청 방지), 이미 받은 건 건너뜀
let _pfQueue = [], _pfActive = 0;
function prefetchDictAudio(words) {
  for (let w of words) {
    w = String(w).split('/')[0].trim().toLowerCase();
    if (/^[a-z'-]+$/.test(w) && _pfQueue.indexOf(w) < 0) _pfQueue.push(w);   // URL 캐시 여부와 무관하게 통과 → 소리 파일까지 확보
  }
  _pumpPrefetch();
}
function _pumpPrefetch() {
  while (_pfActive < 4 && _pfQueue.length) {
    const w = _pfQueue.shift();
    _pfActive++;
    getDictAudio(w).then(u => { if (u) preloadAudio(u); }, () => {}).then(() => { _pfActive--; _pumpPrefetch(); });
  }
}

let speakSeq = 0;   // 최신 발음 요청만 소리내기 위한 세대 토큰
function playUrl(url) {
  return new Promise(res => {
    let done = false, timer = null;
    const fin = ok => { if (!done) { done = true; if (timer) clearTimeout(timer); res(ok); } };
    const a = audioCache[url] || player;   // 미리 받아둔 음원이 있으면 그걸로 즉시 재생
    curAudio = a;
    a.onended = () => fin(true);
    a.onerror = () => fin(false);
    try {
      if (a === player) a.src = url;
      try { a.currentTime = 0; } catch (e) {}
      a.play().then(() => { timer = setTimeout(() => fin(true), 7000); }).catch(() => fin(false));
    } catch (e) { fin(false); }
  });
}
function googleTtsUrl(t) { return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=' + encodeURIComponent(t); }

// 기기 음성 폴백 — 자연스러운 en-US 음성 자동 선택
function enVoices() { return ttsOK ? speechSynthesis.getVoices().filter(v => /^en([-_]|$)/i.test(v.lang)) : []; }
function rankVoice(v) { let s = 0; if (/natural|neural/i.test(v.name)) s += 8; if (v.localService) s += 4; if (/en[-_]US/i.test(v.lang)) s += 2; return s; }
function pickVoice() { const vs = enVoices(); return vs.length ? vs.slice().sort((a, b) => rankVoice(b) - rankVoice(a))[0] : null; }
function speakTTS(t) {
  return new Promise(res => {
    if (!ttsOK) return res(false);
    if (!enVoice) enVoice = pickVoice();
    const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.9; if (enVoice) u.voice = enVoice;
    u.onend = () => res(true); u.onerror = () => res(true);
    try { speechSynthesis.cancel(); setTimeout(() => { speechSynthesis.speak(u); speechSynthesis.resume(); }, 50); } catch (e) { res(false); }
  });
}
async function pronounce(text) {
  const my = ++speakSeq;   // 이 호출이 최신인 동안에만 진행
  stopAudio();
  const t = text.trim();
  const single = /^[A-Za-z'-]+$/.test(t);
  if (single) {
    const url = await getDictAudio(t.toLowerCase());
    if (my !== speakSeq) return;                 // 더 새 요청이 들어옴 → 폐기
    if (url && await playUrl(url)) return;
    if (my !== speakSeq) return;
  }
  if (await playUrl(googleTtsUrl(text))) return;
  if (my !== speakSeq) return;
  await speakTTS(text);
}
function speak(text) { pronounce(text); }
function speakForm(s) { speak(s.split('/')[0]); }   // 슬래시 변형은 첫 형태만 발음
if (ttsOK) { enVoice = pickVoice(); speechSynthesis.onvoiceschanged = () => { enVoice = pickVoice(); }; }

// ===== Hero / 카운트 =====
function updateHero() {
  const acc = store.answered ? Math.round(store.correct / store.answered * 100) : 0;
  document.getElementById('hAcc').textContent = acc + '%';
  document.getElementById('hStreak').textContent = store.bestStreak;
  document.getElementById('hAnswered').textContent = store.answered;
}
function updateReviewCount() { document.getElementById('reviewCount').textContent = store.wrong.length; }

// ===== 정리표 =====
function renderTable() {
  const items = levelItems();
  let html = `<div class="hide-toggles">
    <button class="chip ${hidePast ? 'on' : ''}" id="tgPast">과거 가리기</button>
    <button class="chip ${hidePP ? 'on' : ''}" id="tgPP">과거분사 가리기</button>
    <button class="chip ${hideMean ? 'on' : ''}" id="tgMean">뜻 가리기</button>
  </div>`;
  for (const [pat, group] of byPattern(items)) {
    html += `<div class="pat-title">${esc(IV_PAT[pat])}</div>
      <table class="iv"><tr><th>원형</th><th>과거</th><th>과거분사</th><th>뜻</th><th></th></tr>`;
    for (const v of group) {
      const mastered = stat(v.key).c >= 3;
      html += `<tr>
        <td class="iv-base say" data-s="${esc(v.b)}">${esc(v.b)}</td>
        <td class="iv-form say ${hidePast ? 'cell-hidden' : ''}" data-s="${esc(v.pa)}">${esc(v.pa)}</td>
        <td class="iv-form say ${hidePP ? 'cell-hidden' : ''}" data-s="${esc(v.pp)}">${esc(v.pp)}</td>
        <td class="iv-mean ${hideMean ? 'cell-hidden' : ''}">${esc(v.m)}</td>
        <td class="star-td">${mastered ? '⭐' : ''}</td>
      </tr>`;
    }
    html += `</table>`;
  }
  html += `<div class="table-hint">단어를 누르면 발음이 들려요 · 가린 칸은 눌러서 확인</div>`;
  const el = document.getElementById('view');
  el.innerHTML = html;
  el.querySelector('#tgPast').addEventListener('click', () => { hidePast = !hidePast; renderTable(); });
  el.querySelector('#tgPP').addEventListener('click', () => { hidePP = !hidePP; renderTable(); });
  el.querySelector('#tgMean').addEventListener('click', () => { hideMean = !hideMean; renderTable(); });
  el.querySelectorAll('td.cell-hidden').forEach(td => td.addEventListener('click', () => td.classList.remove('cell-hidden'), { once: true }));
  el.querySelectorAll('.say').forEach(td => td.addEventListener('click', () => { if (!td.classList.contains('cell-hidden')) speakForm(td.dataset.s); }));
  prefetchDictAudio(items.flatMap(v => [v.b, v.pa, v.pp]));   // 원형·과거·과거분사 음원 미리 받아두기
}

// ===== 카드 =====
function startCards() { cardDeck = shuffle(levelItems()); cardIdx = 0; cardFlipped = false; prefetchDictAudio(cardDeck.flatMap(v => [v.b, v.pa, v.pp])); }
function renderCards() {
  if (!cardDeck.length) startCards();
  const v = cardDeck[cardIdx];
  const el = document.getElementById('view');
  if (!v) { el.innerHTML = '<div class="search-empty">단어가 없어요.</div>'; return; }
  el.innerHTML = `
    <div class="flip-card ${cardFlipped ? 'back' : ''}" id="flip">
      ${cardFlipped
        ? `<div class="fc-cat">${esc(IV_PAT[v.pat])}</div>
           <div class="fc-forms">${esc(v.b)}<span class="arr">→</span>${esc(v.pa)}<span class="arr">→</span>${esc(v.pp)}</div>
           <div class="fc-sub">${esc(v.m)}</div>`
        : `<div class="fc-cat">원형 · 뜻</div><div class="fc-main">${esc(v.b)}</div><div class="fc-sub">${esc(v.m)} · 누르면 변화형이 보여요</div>`}
    </div>
    <div class="actions">
      <button class="secondary" id="cPrev">◀ 이전</button>
      <button id="cFlip">뒤집기</button>
      <button class="secondary" id="cSpeak">🔊 듣기</button>
      <button class="secondary" id="cNext">다음 ▶</button>
      <button class="secondary" id="cShuffle">🔀 섞기</button>
    </div>
    <div class="footer-bar">진행 <span>${cardIdx + 1} / ${cardDeck.length}</span></div>`;
  const flip = () => { cardFlipped = !cardFlipped; renderCards(); if (cardFlipped) speakForm(v.b); };
  el.querySelector('#flip').addEventListener('click', flip);
  el.querySelector('#cFlip').addEventListener('click', flip);
  el.querySelector('#cSpeak').addEventListener('click', () => speak(v.b + ', ' + v.pa.split('/')[0] + ', ' + v.pp.split('/')[0]));
  el.querySelector('#cPrev').addEventListener('click', () => { cardIdx = (cardIdx - 1 + cardDeck.length) % cardDeck.length; cardFlipped = false; renderCards(); });
  el.querySelector('#cNext').addEventListener('click', () => { cardIdx = (cardIdx + 1) % cardDeck.length; cardFlipped = false; renderCards(); });
  el.querySelector('#cShuffle').addEventListener('click', () => { startCards(); renderCards(); });
}

// ===== 테스트 =====
function testPool() { return reviewOn ? reviewItems() : levelItems(); }
function startTest(type) {
  testType = type;
  testQs = shuffle(testPool().slice()).slice(0, Math.min(10, testPool().length));
  testIdx = 0; testScore = 0; testLocked = false; testOver = false;
  prefetchDictAudio(testQs.flatMap(v => [v.b, v.pa, v.pp]));
  renderTest();
}
function renderTestMenu() {
  const el = document.getElementById('view');
  el.innerHTML = `<div class="q-label" style="margin-bottom:14px">✏️ ${esc(level)} 테스트 유형</div>
    <div class="test-grid">
      <div class="test-opt" data-t="type"><div class="to-icon">⌨️</div><b>3단 변화 입력</b><span>과거·과거분사 직접 쓰기</span></div>
      <div class="test-opt" data-t="cloze"><div class="to-icon">📝</div><b>빈칸 채우기</b><span>빠진 변화형 입력</span></div>
      <div class="test-opt" data-t="mc"><div class="to-icon">🅰️</div><b>4지선다</b><span>올바른 변화 고르기</span></div>
      <div class="test-opt" data-t="dict"><div class="to-icon">🎧</div><b>듣고 쓰기</b><span>발음 듣고 철자 입력</span></div>
    </div>`;
  el.querySelectorAll('.test-opt').forEach(o => o.addEventListener('click', () => startTest(o.dataset.t)));
}
function mcChoices(v) {
  const pool = shuffle(ALL.filter(x => x.key !== v.key));
  const picks = pool.slice(0, 3).map(x => x.pa.split('/')[0] + ' · ' + x.pp.split('/')[0]);
  const correct = v.pa.split('/')[0] + ' · ' + v.pp.split('/')[0];
  return shuffle([correct, ...picks]).map(s => ({ s, ok: s === correct }));
}
function afterAnswer() {
  setTimeout(() => {
    testIdx++; testLocked = false;
    if (testIdx >= testQs.length) testOver = true;
    renderTest();
  }, 1500);
}
function renderTest() {
  const el = document.getElementById('view');
  if (testType === null) { renderTestMenu(); return; }
  if (testOver) {
    const pct = Math.round(testScore / testQs.length * 100);
    el.innerHTML = `<div style="padding:24px 0">
      <div style="font-size:52px">${pct === 100 ? '🏆' : pct >= 70 ? '😊' : '💪'}</div>
      <div style="font-size:26px;font-weight:800;margin:8px 0">${pct}점</div>
      <div style="color:var(--muted)">${testScore} / ${testQs.length} 정답</div>
      <div class="actions"><button id="again">다시 풀기</button><button class="secondary" id="menu">다른 유형</button></div></div>`;
    el.querySelector('#again').addEventListener('click', () => startTest(testType));
    el.querySelector('#menu').addEventListener('click', () => { testType = null; renderTest(); });
    return;
  }
  const v = testQs[testIdx];
  const head = `<div class="progress-line">${testIdx + 1} / ${testQs.length} · 점수 ${testScore}${reviewOn ? ' · 🔄 복습' : ''}</div>`;

  if (testType === 'type') {
    el.innerHTML = head + `<div class="q-prompt">${esc(v.b)}</div><div class="q-mean">${esc(v.m)}</div>
      <div class="q-label">과거형과 과거분사형을 쓰세요</div>
      <div class="form-inputs">
        <div class="fi"><label>과거</label><input class="answer" id="ipa" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="next"></div>
        <div class="fi"><label>과거분사</label><input class="answer" id="ipp" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="done"></div>
        <button id="ansBtn">확인</button>
      </div>
      <div class="feedback" id="fb">&nbsp;</div><div class="ans-reveal" id="rev">&nbsp;</div>`;
    const ipa = el.querySelector('#ipa'), ipp = el.querySelector('#ipp');
    ipa.focus();
    ipa.addEventListener('keydown', e => { if (e.key === 'Enter') ipp.focus(); });
    ipp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    const submit = () => {
      if (testLocked) return;
      if (!ipa.value.trim() || !ipp.value.trim()) return;
      testLocked = true;
      const ok = formMatch(ipa.value, v.pa) && formMatch(ipp.value, v.pp);
      if (ok) testScore++;
      bump(v.key, ok);
      el.querySelector('#fb').textContent = ok ? '✓ 정답!' : '✗ 다시 외워요';
      el.querySelector('#fb').className = 'feedback ' + (ok ? 'correct' : 'wrong');
      el.querySelector('#rev').textContent = v.b + ' → ' + v.pa + ' → ' + v.pp;
      speakForm(v.pa);
      afterAnswer();
    };
    el.querySelector('#ansBtn').addEventListener('click', submit);
  } else if (testType === 'cloze') {
    curBlank = Math.random() < 0.5 ? 'pa' : 'pp';
    const shown = curBlank === 'pa'
      ? `${esc(v.b)} <span class="arr">→</span> _____ <span class="arr">→</span> ${esc(v.pp)}`
      : `${esc(v.b)} <span class="arr">→</span> ${esc(v.pa)} <span class="arr">→</span> _____`;
    el.innerHTML = head + `<div class="q-prompt" style="font-size:24px">${shown}</div><div class="q-mean">${esc(v.m)}</div>
      <div class="q-label">빈칸에 들어갈 ${curBlank === 'pa' ? '과거형' : '과거분사형'}을 쓰세요</div>
      <div class="answer-row"><input class="answer" id="ans" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="done"><button id="ansBtn">확인</button></div>
      <div class="feedback" id="fb">&nbsp;</div><div class="ans-reveal" id="rev">&nbsp;</div>`;
    const inp = el.querySelector('#ans'); inp.focus();
    const submit = () => {
      if (testLocked) return; if (!inp.value.trim()) return;
      testLocked = true;
      const ans = curBlank === 'pa' ? v.pa : v.pp;
      const ok = formMatch(inp.value, ans);
      if (ok) testScore++;
      bump(v.key, ok);
      el.querySelector('#fb').textContent = ok ? '✓ 정답!' : '✗ 정답: ' + ans;
      el.querySelector('#fb').className = 'feedback ' + (ok ? 'correct' : 'wrong');
      el.querySelector('#rev').textContent = v.b + ' → ' + v.pa + ' → ' + v.pp;
      speakForm(ans);
      afterAnswer();
    };
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    el.querySelector('#ansBtn').addEventListener('click', submit);
  } else if (testType === 'mc') {
    const choices = mcChoices(v);
    let html = head + `<div class="q-prompt">${esc(v.b)}</div><div class="q-mean">${esc(v.m)}</div>
      <div class="q-label">과거 · 과거분사가 올바른 것은?</div><div class="opts">`;
    choices.forEach((c, i) => { html += `<button class="opt" data-i="${i}">${esc(c.s)}</button>`; });
    html += `</div><div class="feedback" id="fb">&nbsp;</div>`;
    el.innerHTML = html;
    el.querySelectorAll('.opt').forEach((btn, i) => btn.addEventListener('click', () => {
      if (testLocked) return; testLocked = true;
      const ok = choices[i].ok;
      el.querySelectorAll('.opt').forEach((b, j) => { if (choices[j].ok) b.classList.add('right'); else if (j === i) b.classList.add('bad'); });
      if (ok) testScore++;
      bump(v.key, ok);
      el.querySelector('#fb').textContent = ok ? '✓ 정답!' : '✗ 정답은 초록색';
      el.querySelector('#fb').className = 'feedback ' + (ok ? 'correct' : 'wrong');
      speakForm(v.pa);
      afterAnswer();
    }));
  } else { // dict
    const which = ['b', 'pa', 'pp'][Math.floor(Math.random() * 3)];
    const target = which === 'b' ? v.b : which === 'pa' ? v.pa : v.pp;
    const label = which === 'b' ? '원형' : which === 'pa' ? '과거형' : '과거분사형';
    el.innerHTML = head + `<div class="actions" style="margin-top:8px"><button id="replay" style="font-size:20px;padding:14px 26px">🔊 다시 듣기</button></div>
      <div class="q-mean" style="margin-top:12px">뜻: ${esc(v.m)} · <b>${label}</b>을 듣고 쓰세요</div>
      <div class="answer-row"><input class="answer" id="ans" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="done"><button id="ansBtn">확인</button></div>
      <div class="feedback" id="fb">&nbsp;</div><div class="ans-reveal" id="rev">&nbsp;</div>`;
    const inp = el.querySelector('#ans'); inp.focus();
    speakForm(target);
    el.querySelector('#replay').addEventListener('click', () => speakForm(target));
    const submit = () => {
      if (testLocked) return; if (!inp.value.trim()) return;
      testLocked = true;
      const ok = formMatch(inp.value, target);
      if (ok) testScore++;
      bump(v.key, ok);
      el.querySelector('#fb').textContent = ok ? '✓ 정답!' : '✗ 정답: ' + target;
      el.querySelector('#fb').className = 'feedback ' + (ok ? 'correct' : 'wrong');
      el.querySelector('#rev').textContent = v.b + ' → ' + v.pa + ' → ' + v.pp + ' (' + esc(v.m) + ')';
      afterAnswer();
    };
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    el.querySelector('#ansBtn').addEventListener('click', submit);
  }
}

// ===== 복습 =====
function renderReview() {
  const el = document.getElementById('view');
  const items = reviewItems();
  if (!items.length) {
    reviewOn = false;
    el.innerHTML = `<div style="padding:36px 0"><div style="font-size:48px">🎉</div>
      <div style="font-size:18px;font-weight:800;margin:10px 0">복습할 동사가 없어요!</div>
      <div style="color:var(--muted);font-size:13.5px">테스트에서 틀린 동사가 여기에 모여요.</div></div>`;
    return;
  }
  if (!reviewOn) {
    let html = `<div style="font-size:15px;font-weight:800;margin-bottom:10px">🔄 틀린 동사 ${items.length}개</div>
      <div class="actions" style="margin-bottom:14px"><button id="startRev">복습 시작 (3단 입력)</button></div>
      <table class="iv"><tr><th>원형</th><th>과거</th><th>과거분사</th><th>뜻</th></tr>`;
    for (const v of items) {
      html += `<tr><td class="iv-base say" data-s="${esc(v.b)}">${esc(v.b)}</td><td class="iv-form">${esc(v.pa)}</td><td class="iv-form">${esc(v.pp)}</td><td class="iv-mean">${esc(v.m)}</td></tr>`;
    }
    html += `</table>`;
    el.innerHTML = html;
    el.querySelector('#startRev').addEventListener('click', () => { reviewOn = true; startTest('type'); });

// ===== 검색 =====
function renderSearch() {
  const el = document.getElementById('view');
  el.innerHTML = `<input id="searchBox" placeholder="원형·과거·과거분사·뜻으로 검색 (예: go, went, 가다)" autocomplete="off" spellcheck="false">
    <div id="searchResults"></div>`;
  const box = el.querySelector('#searchBox');
  box.value = searchQuery; box.focus();
  box.addEventListener('input', () => { searchQuery = box.value; renderSearchResults(); });
  renderSearchResults();
}
function hl(t, q) { if (!q) return esc(t); return esc(t).replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'), '<mark>$1</mark>'); }
function renderSearchResults() {
  const wrap = document.getElementById('searchResults');
  const q = searchQuery.trim();
  if (!q) { wrap.innerHTML = '<div class="search-empty">전체 ' + ALL.length + '개 동사를 검색할 수 있어요</div>'; return; }
  const ql = q.toLowerCase();
  const hits = ALL.filter(v => (v.b + ' ' + v.pa + ' ' + v.pp + ' ' + v.m).toLowerCase().includes(ql));
  if (!hits.length) { wrap.innerHTML = `<div class="search-empty">"${esc(q)}" 검색 결과가 없어요</div>`; return; }
  let html = `<div class="sr-count">${hits.length}개 · 단어를 누르면 발음이 들려요</div><table class="iv"><tr><th>원형</th><th>과거</th><th>과거분사</th><th>뜻</th><th>단계</th></tr>`;
  for (const v of hits) {
    html += `<tr>
      <td class="iv-base say" data-s="${esc(v.b)}">${hl(v.b, q)}</td>
      <td class="iv-form say" data-s="${esc(v.pa)}">${hl(v.pa, q)}</td>
      <td class="iv-form say" data-s="${esc(v.pp)}">${hl(v.pp, q)}</td>
      <td class="iv-mean">${hl(v.m, q)}</td>
      <td class="iv-mean" style="font-size:11.5px">${esc(v.g)}</td></tr>`;
  }
  html += `</table>`;
  wrap.innerHTML = html;
  wrap.querySelectorAll('.say').forEach(td => td.addEventListener('click', () => speakForm(td.dataset.s)));
}

// ===== 모드 전환 =====
function render() {
  if (mode === 'table') renderTable();
  else if (mode === 'cards') { startCards(); renderCards(); }
  else if (mode === 'test') { testType = null; testOver = false; reviewOn = false; renderTest(); }
  else if (mode === 'review') renderReview();
  else renderSearch();
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  stopAudio();
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  mode = t.dataset.mode;
  reviewOn = false;
  render();
}));
document.getElementById('lvSel').addEventListener('change', e => {
  level = e.target.value; store.level = level; saveStore();
  document.getElementById('lvDesc').textContent = IV_LEVEL_DESC[level] || (level === PAT_LV ? '전체 동사를 변화 패턴(A-A-A / A-B-B / A-B-A / A-B-C)으로 모아서' : '');
  reviewOn = false;
  render();
});

// ===== 초기화 =====
const lvSel = document.getElementById('lvSel');
lvSel.innerHTML = LEVELS.map(l => `<option value="${l}">${l === PAT_LV ? l : l + ' 동사'} (${l === PAT_LV ? ALL.length : ALL.filter(v => v.g === l).length}개)</option>`).join('');
lvSel.value = level;
document.getElementById('lvDesc').textContent = IV_LEVEL_DESC[level] || '';
document.getElementById('totCnt').textContent = ALL.length;
updateHero();
updateReviewCount();
render();
</script>
