<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>🌸 일본어 학습 🌸</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #fff5f8 0%, #ffe6ee 100%);
    color: #4a2c3a;
    font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 18px;
    font-size: 30px;
    color: #d63384;
    text-shadow: 2px 2px 0 #fff;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab {
    padding: 10px 18px;
    background: #fff;
    border: 2px solid #ffc1cc;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: #6c4757;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { background: #ffe6ee; }
  .tab.active {
    background: #d63384;
    color: white;
    border-color: #d63384;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 540px;
    max-width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .meaning {
    color: #888;
    font-size: 18px;
    margin-bottom: 8px;
    min-height: 26px;
  }
  .prompt {
    font-size: 96px;
    margin: 8px 0;
    color: #2a1825;
    font-weight: 500;
    line-height: 1.1;
    word-break: keep-all;
  }
  .prompt.small { font-size: 40px; line-height: 1.35; }
  .prompt.medium { font-size: 60px; }
  .reading {
    color: #b58aa0;
    font-size: 18px;
    margin: 4px 0 12px;
    min-height: 24px;
    letter-spacing: 1px;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 22px;
    border: 2px solid #ffc1cc;
    border-radius: 10px;
    outline: none;
    text-align: center;
    font-family: inherit;
  }
  input[type="text"]:focus { border-color: #d63384; }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 22px;
    background: #d63384;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  button.secondary {
    background: #f5e1e8;
    color: #6c4757;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: translateY(1px); }
  .feedback {
    min-height: 32px;
    margin-top: 14px;
    font-weight: bold;
    font-size: 18px;
  }
  .correct { color: #28a745; }
  .wrong { color: #d63384; }
  .answer-display {
    margin-top: 4px;
    color: #888;
    font-size: 15px;
    min-height: 22px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
    font-size: 14px;
    color: #888;
  }
  .footer span { color: #d63384; font-weight: bold; }
  .life-stats {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #f0d4dd;
    font-size: 12px;
    color: #b58aa0;
    text-align: center;
  }
  .info {
    margin-top: 18px;
    font-size: 13px;
    color: #999;
    text-align: center;
    line-height: 1.6;
    max-width: 540px;
  }
  /* Chart (study) view */
  .chart-card { width: 660px; }
  .chart-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .chart-toggle button {
    background: #f5e1e8;
    color: #6c4757;
    padding: 8px 18px;
  }
  .chart-toggle button.active { background: #d63384; color: #fff; }
  .chart-section-title {
    text-align: left;
    color: #d63384;
    font-weight: bold;
    font-size: 15px;
    margin: 18px 0 8px;
  }
  .kana-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }
  .kana-cell {
    background: #fff;
    border: 2px solid #ffd6e0;
    border-radius: 10px;
    padding: 8px 2px 6px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .kana-cell:hover { background: #ffe6ee; border-color: #d63384; transform: translateY(-2px); }
  .kana-cell:active { transform: translateY(0); }
  .kana-cell.flash { background: #d63384; }
  .kana-cell.flash .big, .kana-cell.flash .rom { color: #fff; }
  .kana-cell .big { font-size: 30px; color: #2a1825; line-height: 1.1; }
  .kana-cell .rom { font-size: 12px; color: #b58aa0; margin-top: 2px; }
  .kana-cell.empty { background: transparent; border: none; cursor: default; }
  .kana-cell.empty:hover { transform: none; }
  .chart-hint { margin-top: 16px; font-size: 13px; color: #999; }

  /* ===== mobile ===== */
  @media (max-width: 600px) {
    body { padding: 16px 10px 30px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    .tab { padding: 8px 12px; font-size: 13px; }
    .card { padding: 20px 14px; }
    .prompt { font-size: 64px; }
    .prompt.medium { font-size: 42px; }
    .prompt.small { font-size: 26px; }
    .meaning { font-size: 15px; }
    .reading { font-size: 15px; }
    input[type="text"] { font-size: 18px; padding: 12px; }
    button { padding: 9px 14px; font-size: 13.5px; }
    .feedback { font-size: 16px; }
    .kana-grid { gap: 5px; }
    .kana-cell { padding: 6px 1px 5px; border-radius: 8px; }
    .kana-cell .big { font-size: 22px; }
    .kana-cell .rom { font-size: 10.5px; }
    .chart-section-title { font-size: 13.5px; }
    .footer { flex-wrap: wrap; gap: 4px; justify-content: center; }
    .info { font-size: 12px; }
  }
</style>
</head>
<body>
<h1>🌸 일본어 학습 🌸</h1>
<div class="tabs">
  <div class="tab active" data-mode="chart">📖 표 외우기</div>
  <div class="tab" data-mode="hiragana">히라가나</div>
  <div class="tab" data-mode="katakana">가타카나</div>
  <div class="tab" data-mode="words">단어</div>
  <div class="tab" data-mode="sentences">문장</div>
  <div class="tab" data-mode="review">❌ 복습 <span id="reviewCount">0</span></div>
</div>

<!-- Study chart view -->
<div class="card chart-card" id="chartView">
  <div class="chart-toggle">
    <button id="chartHira" class="active">히라가나</button>
    <button id="chartKata">가타카나</button>
  </div>
  <div id="chartBody"></div>
  <div class="chart-hint" id="voiceStatus">🔊 글자를 클릭하면 일본어 발음이 들려요</div>
</div>

<!-- Quiz view -->
<div class="card" id="quizCard" style="display:none;">
  <div class="meaning" id="meaning">&nbsp;</div>
  <div class="prompt" id="prompt">あ</div>
  <div class="reading" id="reading">&nbsp;</div>
  <input type="text" id="answer" placeholder="발음을 한글로 입력 (예: 와따시)" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <div class="actions">
    <button id="check">확인 (Enter)</button>
    <button id="speak" class="secondary">🔊 듣기</button>
    <button id="hint" class="secondary">힌트</button>
    <button id="next" class="secondary">다음 ▶</button>
  </div>
  <div class="feedback" id="feedback">&nbsp;</div>
  <div class="answer-display" id="answerDisplay">&nbsp;</div>
  <div class="footer">
    <div>점수: <span id="score">0</span></div>
    <div>🔥 연속: <span id="streak">0</span></div>
    <div>진행: <span id="progress">1 / —</span></div>
  </div>
  <div class="life-stats" id="lifeStats">누적 정답률 0%  ·  최고 연속 0  ·  푼 문제 0</div>
</div>
<div class="info">
  발음을 한글로 적으세요. 예: わたしはげんきです。 → 와따시와 갱끼데쓰<br>
  된소리/거센소리/연한소리 모두 인정 (카/까/가, 데스/데쓰 등)
</div>

  { jp: 'すきです。', reading: 'すきです。', kor: ['스키데스', '스끼데쓰'], meaning: '좋아합니다.' },
  { jp: 'だいじょうぶです。', reading: 'だいじょうぶです。', kor: ['다이조부데쓰', '다이죠부데스'], meaning: '괜찮습니다.' },
  { jp: 'にほんがすきです。', reading: 'にほんがすきです。', kor: ['니혼가 스키데스', '니홍가 스끼데쓰'], meaning: '일본을 좋아합니다.' },
  { jp: 'みずをのみます。', reading: 'みずをのみます。', kor: ['미즈오 노미마스', '미즈오 노미마쓰'], meaning: '물을 마십니다.' }
];

// Gojūon chart: each cell = [hiragana, katakana, korean reading]
const GOJUON = [
  [['あ','ア','아'],['い','イ','이'],['う','ウ','우'],['え','エ','에'],['お','オ','오']],
  [['か','カ','카'],['き','キ','키'],['く','ク','쿠'],['け','ケ','케'],['こ','コ','코']],
  [['さ','サ','사'],['し','シ','시'],['す','ス','스'],['せ','セ','세'],['そ','ソ','소']],
  [['た','タ','타'],['ち','チ','치'],['つ','ツ','츠'],['て','テ','테'],['と','ト','토']],
  [['な','ナ','나'],['に','ニ','니'],['ぬ','ヌ','누'],['ね','ネ','네'],['の','ノ','노']],
  [['は','ハ','하'],['ひ','ヒ','히'],['ふ','フ','후'],['へ','ヘ','헤'],['ほ','ホ','호']],
  [['ま','マ','마'],['み','ミ','미'],['む','ム','무'],['め','メ','메'],['も','モ','모']],
  [['や','ヤ','야'],null,['ゆ','ユ','유'],null,['よ','ヨ','요']],
  [['ら','ラ','라'],['り','リ','리'],['る','ル','루'],['れ','レ','레'],['ろ','ロ','로']],
  [['わ','ワ','와'],null,null,null,['を','ヲ','오']],
  [['ん','ン','응'],null,null,null,null]
];

const GOJUON_DAKUTEN = [
  [['が','ガ','가'],['ぎ','ギ','기'],['ぐ','グ','구'],['げ','ゲ','게'],['ご','ゴ','고']],
  [['ざ','ザ','자'],['じ','ジ','지'],['ず','ズ','즈'],['ぜ','ゼ','제'],['ぞ','ゾ','조']],
  [['だ','ダ','다'],['ぢ','ヂ','지'],['づ','ヅ','즈'],['で','デ','데'],['ど','ド','도']],
  [['ば','バ','바'],['び','ビ','비'],['ぶ','ブ','부'],['べ','ベ','베'],['ぼ','ボ','보']],
  [['ぱ','パ','파'],['ぴ','ピ','피'],['ぷ','プ','푸'],['ぺ','ペ','페'],['ぽ','ポ','포']]
];

// Yōon (요음): [hiragana, katakana, [korean readings]]
const YOON = [
  ['きゃ','キャ',['캬','꺄','갸']], ['きゅ','キュ',['큐','뀨','규']], ['きょ','キョ',['쿄','꾜','교']],
  ['しゃ','シャ',['샤']],          ['しゅ','シュ',['슈']],          ['しょ','ショ',['쇼']],
  ['ちゃ','チャ',['차','짜','자']], ['ちゅ','チュ',['추','쮸','주']], ['ちょ','チョ',['초','쪼','조']],
  ['にゃ','ニャ',['냐']],          ['にゅ','ニュ',['뉴']],          ['にょ','ニョ',['뇨']],
  ['ひゃ','ヒャ',['햐']],          ['ひゅ','ヒュ',['휴']],          ['ひょ','ヒョ',['효']],
  ['みゃ','ミャ',['먀']],          ['みゅ','ミュ',['뮤']],          ['みょ','ミョ',['묘']],
  ['りゃ','リャ',['랴']],          ['りゅ','リュ',['류']],          ['りょ','リョ',['료']],
  ['ぎゃ','ギャ',['갸']],          ['ぎゅ','ギュ',['규']],          ['ぎょ','ギョ',['교']],
  ['じゃ','ジャ',['자','쟈']],     ['じゅ','ジュ',['주','쥬']],     ['じょ','ジョ',['조','죠']],
  ['びゃ','ビャ',['뱌']],          ['びゅ','ビュ',['뷰']],          ['びょ','ビョ',['뵤']],
  ['ぴゃ','ピャ',['퍄','뺘']],     ['ぴゅ','ピュ',['퓨','쀼']],     ['ぴょ','ピョ',['표','뾰']]
];

// Append yōon to the hiragana / katakana quiz decks
YOON.forEach(([h, k, r]) => {
  HIRAGANA.push({ k: h, r: r.slice() });
  KATAKANA.push({ k: k, r: r.slice() });
});

// === Persistent stats (localStorage) ===
const STORE_KEY = 'jp-learn-v1';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveStore() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {}
}
const saved = loadStore();
const store = {
  answered: saved.answered || 0,
  correct: saved.correct || 0,
  bestStreak: saved.bestStreak || 0,
  wrongKeys: Array.isArray(saved.wrongKeys) ? saved.wrongKeys : []  // ["mode key", ...]
};

// === State ===
let mode = 'chart';
let chartScript = 'hira';
let streak = 0;
let deck = [];
let idx = 0;
let score = 0;
let wrongTried = false;

// Index every item by "mode key" so the review deck can be rebuilt from saved keys
const ITEM_INDEX = {};
function indexItems(arr, m) {
  arr.forEach(it => { ITEM_INDEX[m + ' ' + (it.k || it.jp)] = Object.assign({ __mode: m }, it); });
}
indexItems(HIRAGANA, 'hiragana');
indexItems(KATAKANA, 'katakana');
indexItems(WORDS, 'words');
indexItems(SENTENCES, 'sentences');

function itemMode(item) { return item.__mode || mode; }
function keyOf(item) { return item.k || item.jp; }
function wrongKeyOf(item) { return itemMode(item) + ' ' + keyOf(item); }
function isKana(m) { return m === 'hiragana' || m === 'katakana'; }
function answersFor(item) { return isKana(itemMode(item)) ? item.r : item.kor; }

function getData() {
  switch (mode) {
    case 'hiragana': return HIRAGANA;
    case 'katakana': return KATAKANA;
    case 'words': return WORDS;
    case 'sentences': return SENTENCES;
    case 'review': return store.wrongKeys.map(k => ITEM_INDEX[k]).filter(Boolean);
  }
}

function shuffleDeck() {
  deck = getData().slice();
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
}

function normalize(s) {
  return s.trim().replace(/\s+/g, '').toLowerCase();
}

function render() {
  const item = deck[idx];
  if (!item) return;
  const m = itemMode(item);
  const promptEl = document.getElementById('prompt');
  const meaningEl = document.getElementById('meaning');
  const readingEl = document.getElementById('reading');
  const answerEl = document.getElementById('answer');
  const feedbackEl = document.getElementById('feedback');
  const answerDisplay = document.getElementById('answerDisplay');

  promptEl.className = 'prompt';
  if (isKana(m)) {
    promptEl.textContent = item.k;
    meaningEl.innerHTML = '&nbsp;';
    readingEl.innerHTML = '&nbsp;';
  } else if (m === 'words') {
    promptEl.textContent = item.jp;
    promptEl.classList.add('medium');
    meaningEl.textContent = item.meaning;
    readingEl.innerHTML = '&nbsp;';
  } else {
    promptEl.textContent = item.jp;
    promptEl.classList.add('small');
    meaningEl.textContent = item.meaning;
    readingEl.innerHTML = '&nbsp;';
  }
  answerEl.value = '';
  answerEl.focus();
  feedbackEl.innerHTML = '&nbsp;';
  feedbackEl.className = 'feedback';
  answerDisplay.innerHTML = '&nbsp;';
  wrongTried = false;

  document.getElementById('progress').textContent = `${idx + 1} / ${deck.length}`;
}

function check() {
  const item = deck[idx];
  if (!item) return;
  const ans = normalize(document.getElementById('answer').value);
  if (!ans) return;
  const isCorrect = answersFor(item).some(a => normalize(a) === ans);
  const feedbackEl = document.getElementById('feedback');
  if (isCorrect) {
    feedbackEl.textContent = '✓ 정답!';
    feedbackEl.className = 'feedback correct';
    if (!wrongTried) {
      score++;
      streak++;
      store.answered++;
      store.correct++;
      if (streak > store.bestStreak) store.bestStreak = streak;
      removeWrong(item);   // mastered → drop from review list
    }
    document.getElementById('score').textContent = score;
    saveStore();
    updateStatsUI();
    speak(item.reading || item.k || item.jp);
    setTimeout(next, 900);
  } else {
    feedbackEl.textContent = '✗ 다시!';
    feedbackEl.className = 'feedback wrong';
    if (!wrongTried) {
      streak = 0;
      store.answered++;
      addWrong(item);      // remember for review
      saveStore();
      updateStatsUI();
    }
    wrongTried = true;
  }
}

function addWrong(item) {
  const key = wrongKeyOf(item);
  if (!store.wrongKeys.includes(key)) store.wrongKeys.push(key);
}
function removeWrong(item) {
  const key = wrongKeyOf(item);
  const i = store.wrongKeys.indexOf(key);
  if (i >= 0) store.wrongKeys.splice(i, 1);
}

function next() {
  idx++;
  if (mode === 'review') {
    // Review deck shrinks as items are mastered; refresh from current wrong list
    if (store.wrongKeys.length === 0) { showReviewEmpty(); return; }
    if (idx >= deck.length) shuffleDeck();
    if (deck.length === 0) { showReviewEmpty(); return; }
    if (idx >= deck.length) idx = 0;
  } else if (idx >= deck.length) {
    shuffleDeck();
  }
  render();
}

function showReviewEmpty() {
  document.getElementById('prompt').className = 'prompt medium';
  document.getElementById('prompt').textContent = '🎉';
  document.getElementById('meaning').textContent = '복습할 문제가 없어요!';
  document.getElementById('reading').innerHTML = '&nbsp;';
  document.getElementById('answer').value = '';
  document.getElementById('feedback').innerHTML = '&nbsp;';
  document.getElementById('answerDisplay').textContent = '문제를 틀리면 여기에 모여요.';
  document.getElementById('progress').textContent = '0 / 0';
}

function showHint() {
  const item = deck[idx];
  if (!item) return;
  document.getElementById('answerDisplay').textContent = '정답: ' + answersFor(item).join(' / ');
  if (!isKana(itemMode(item)) && item.reading && item.reading !== item.jp) {
    document.getElementById('reading').textContent = '【' + item.reading + '】';
  }
}

function updateStatsUI() {
  const acc = store.answered ? Math.round((store.correct / store.answered) * 100) : 0;
  document.getElementById('streak').textContent = streak;
  document.getElementById('lifeStats').textContent =
    `누적 정답률 ${acc}%  ·  최고 연속 ${store.bestStreak}  ·  푼 문제 ${store.answered}`;
  const rc = document.getElementById('reviewCount');
  if (rc) rc.textContent = store.wrongKeys.length;
}

// === 일본어 발음 시스템 ===
// 1순위: 구글 번역 발음(오디오 재생, 인터넷 필요) — PC·안드로이드·아이폰 모두 작동
// 2순위: 기기 내장 일본어 음성(speechSynthesis) — 오프라인 대비
const ttsOK = 'speechSynthesis' in window;
let jaVoice = null;
const player = new Audio();

function stopAudio() {
  try { player.onended = null; player.onerror = null; player.pause(); } catch (e) {}
  if (ttsOK) { try { speechSynthesis.cancel(); } catch (e) {} }
}
function playUrl(url) {
  return new Promise(res => {
    let done = false;
    const finish = ok => { if (!done) { done = true; res(ok); } };
    player.onended = () => finish(true);
    player.onerror = () => finish(false);
    player.src = url;
    player.play().then(() => setTimeout(() => finish(true), 12000))
                 .catch(() => finish(false));
  });
}
function googleTtsUrl(text) {
  return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ja&q=' + encodeURIComponent(text);
}
function findJaVoice() {
  const voices = speechSynthesis.getVoices();
  const ja = voices.filter(v => /^ja([-_]|$)/i.test(v.lang) || /japanese|日本/i.test(v.name));
  return ja.find(v => v.localService) || ja[0] || null;
}
function speakTTS(text) {
  return new Promise(res => {
    if (!ttsOK) return res(false);
    if (!jaVoice) jaVoice = findJaVoice();
    if (!jaVoice) return res(false);
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.85;
    u.voice = jaVoice;
    u.onend = () => res(true);
    u.onerror = () => res(true);
    try {
      speechSynthesis.cancel();
      setTimeout(() => { speechSynthesis.speak(u); speechSynthesis.resume(); }, 50);
    } catch (e) { res(false); }
  });
}
async function pronounce(text) {
  stopAudio();
  if (await playUrl(googleTtsUrl(text))) return;
  await speakTTS(text);
}
function speak(text) { pronounce(text); }

if (ttsOK) {
  jaVoice = findJaVoice();
  speechSynthesis.onvoiceschanged = () => { jaVoice = findJaVoice(); };
  setInterval(() => { if (speechSynthesis.speaking) speechSynthesis.resume(); }, 6000);
}
(function initVoiceStatus() {
  const status = document.getElementById('voiceStatus');
  if (status) status.textContent = '🔊 글자를 클릭하면 일본어 발음이 들려요 (인터넷 연결 시 구글 발음, 오프라인 시 기기 음성)';
})();

// === Chart rendering ===
function buildGrid(rows, scriptIdx, cols) {
  cols = cols || 5;
  let html = `<div class="kana-grid" style="grid-template-columns:repeat(${cols},1fr)">`;
  for (const row of rows) {
    for (const cell of row) {
      if (!cell) {
        html += '<div class="kana-cell empty"></div>';
        continue;
      }
      const kana = cell[scriptIdx];
      const reading = Array.isArray(cell[2]) ? cell[2][0] : cell[2];
      html += `<div class="kana-cell" data-kana="${kana}"><div class="big">${kana}</div><div class="rom">${reading}</div></div>`;
    }
  }
  html += '</div>';
  return html;
}

function chunk(arr, n) {
  const out = [];
  for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n));
  return out;
}

function renderChart() {
  const scriptIdx = chartScript === 'hira' ? 0 : 1;
  const body = document.getElementById('chartBody');
  body.innerHTML =
    '<div class="chart-section-title">기본 (청음)</div>' +
    buildGrid(GOJUON, scriptIdx) +
    '<div class="chart-section-title">탁음 · 반탁음</div>' +
    buildGrid(GOJUON_DAKUTEN, scriptIdx) +
    '<div class="chart-section-title">요음 (꺾어 읽기)</div>' +
    buildGrid(chunk(YOON, 3), scriptIdx, 3);
  body.querySelectorAll('.kana-cell[data-kana]').forEach(cell => {
    cell.addEventListener('click', () => {
      speak(cell.dataset.kana);
      cell.classList.add('flash');
      setTimeout(() => cell.classList.remove('flash'), 200);
    });
  });
  document.getElementById('chartHira').classList.toggle('active', chartScript === 'hira');
  document.getElementById('chartKata').classList.toggle('active', chartScript === 'kata');
}

// === View switching ===
function applyMode(newMode) {
  mode = newMode;
  const isChart = mode === 'chart';
  document.getElementById('chartView').style.display = isChart ? 'block' : 'none';
  document.getElementById('quizCard').style.display = isChart ? 'none' : 'block';
  document.querySelector('.info').style.display = isChart ? 'none' : 'block';
  if (isChart) {
    renderChart();
    return;
  }
  score = 0;
  streak = 0;
  document.getElementById('score').textContent = 0;
  updateStatsUI();
  if (mode === 'review' && store.wrongKeys.length === 0) {
    deck = [];
    idx = 0;
    showReviewEmpty();
    return;
  }
  shuffleDeck();
  render();
}

// === Events ===
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    applyMode(t.dataset.mode);
  });
});
document.getElementById('chartHira').addEventListener('click', () => { chartScript = 'hira'; renderChart(); });
document.getElementById('chartKata').addEventListener('click', () => { chartScript = 'kata'; renderChart(); });
document.getElementById('check').addEventListener('click', check);
document.getElementById('next').addEventListener('click', next);
document.getElementById('hint').addEventListener('click', showHint);
document.getElementById('speak').addEventListener('click', () => {
  const item = deck[idx];
  if (item) speak(item.reading || item.k || item.jp);
});
document.getElementById('answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') check();
});

// === Init ===
updateStatsUI();
applyMode('chart');
</script>
